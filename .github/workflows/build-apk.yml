name: Build APK

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare client build directory
        run: |
          cp main_client.py client_app/
          cp data_cap.py client_app/
          cp config_client.json client_app/
          mkdir -p client_app/utility
          cp utility/base32.py client_app/utility/
          cp utility/dns.py client_app/utility/
          touch client_app/utility/__init__.py

      - name: Build APK with Buildozer Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/client_app:/home/user/hostcwd \
            kivy/buildozer:latest \
            android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: QSTunnel-APK
          path: client_app/bin/*.apk

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: client_app/bin/*.apk
          generate_release_notes: true
          body: |
            ## Donate
            **USDT (BEP20):** `0x76a768B53Ca77B43086946315f0BDF21156bF424`